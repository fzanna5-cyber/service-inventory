function exportPDF(){
  var d=new Date();
  var dateStr=d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  var cats=allCats();

  // Build HTML for print
  var rows='';
  var grouped={};
  data.gear.forEach(function(g){
    if(!grouped[g.cat]) grouped[g.cat]=[];
    grouped[g.cat].push(g);
  });

  cats.forEach(function(c){
    var items=grouped[c.id];
    if(!items||!items.length) return;
    rows+='<tr class="cat-row"><td colspan="6">'+c.icon+' '+c.label+'</td></tr>';
    items.forEach(function(g,i){
      var statusColor=g.status==='ok'?'#4ADE80':g.status==='partial'?'#F97316':'#EF4444';
      var statusLabel=g.status==='ok'?'OK':g.status==='partial'?'Parziale':'Guasto';
      rows+='<tr class="'+(i%2===0?'even':'odd')+'">'
        +'<td>'+esc(g.name)+'</td>'
        +'<td style="color:#888">'+esc(g.model||'')+'</td>'
        +'<td style="text-align:center">'+g.qty+'</td>'
        +'<td style="text-align:center;color:#4ADE80">'+g.qty_ok+'</td>'
        +'<td style="text-align:center;color:'+(g.qty_fault>0?'#EF4444':'#555')+'">'+g.qty_fault+'</td>'
        +'<td style="text-align:center"><span style="background:'+statusColor+'22;color:'+statusColor+';padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">'+statusLabel+'</span></td>'
        +'</tr>';
    });
  });

  // Events summary
  var evRows='';
  (data.events||[]).sort(function(a,b){return a.date.localeCompare(b.date);}).forEach(function(ev){
    var cl=ev.checklist||[];
    var mag=cl.filter(function(x){return x.phase==='mag';});
    var loc=cl.filter(function(x){return x.phase==='loc';});
    var magD=mag.filter(function(x){return x.done;}).length;
    var locD=loc.filter(function(x){return x.done;}).length;
    var colorMap={'ev-blue':'#60A5FA','ev-yellow':'#F5C400','ev-green':'#4ADE80','ev-orange':'#F97316'};
    var col=colorMap[ev.color]||'#60A5FA';
    evRows+='<tr>'
      +'<td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+col+';margin-right:6px"></span>'+esc(ev.name)+'</td>'
      +'<td>'+ev.date+'</td>'
      +'<td>'+esc(ev.location||'-')+'</td>'
      +'<td style="text-align:center">'+(ev.gear||[]).length+' gear + '+(ev.containers||[]).length+' cont.</td>'
      +'<td style="text-align:center">'+magD+'/'+mag.length+' \u2022 '+locD+'/'+loc.length+'</td>'
      +'</tr>';
  });

  var stats={tot:data.gear.length,ok:data.gear.filter(function(g){return g.status==='ok';}).length,partial:data.gear.filter(function(g){return g.status==='partial';}).length,fault:data.gear.filter(function(g){return g.status==='fault';}).length};

  var html='<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<title>SERVICE INVENTORY \u2014 '+dateStr+'</title>'
    +'<style>'
    +'* { box-sizing:border-box; margin:0; padding:0; }'
    +'body { font-family: "Helvetica Neue",Helvetica,Arial,sans-serif; background:#fff; color:#111; font-size:11px; }'
    +'@page { size:A4; margin:15mm 12mm; }'
    +'.page-header { display:flex; justify-content:space-between; align-items:flex-end; border-bottom:3px solid #111; padding-bottom:10px; margin-bottom:16px; }'
    +'.logo { font-size:20px; font-weight:900; letter-spacing:0.12em; text-transform:uppercase; }'
    +'.logo span { color:#F5C400; }'
    +'.logo-sub { font-size:9px; color:#888; letter-spacing:0.1em; text-transform:uppercase; margin-top:2px; }'
    +'.date { font-size:10px; color:#888; text-align:right; }'
    +'.stats-bar { display:flex; gap:12px; margin-bottom:18px; }'
    +'.stat { background:#f5f5f5; border-radius:6px; padding:8px 14px; flex:1; text-align:center; }'
    +'.stat-n { font-size:22px; font-weight:800; }'
    +'.stat-l { font-size:9px; color:#888; text-transform:uppercase; letter-spacing:0.07em; margin-top:1px; }'
    +'.stat-ok .stat-n { color:#16a34a; }'
    +'.stat-partial .stat-n { color:#ea580c; }'
    +'.stat-fault .stat-n { color:#dc2626; }'
    +'h2 { font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#888; margin:18px 0 8px; display:flex; align-items:center; gap:8px; }'
    +'h2::after { content:""; flex:1; height:1px; background:#e5e5e5; }'
    +'table { width:100%; border-collapse:collapse; }'
    +'th { background:#111; color:#fff; padding:6px 8px; text-align:left; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; font-weight:700; }'
    +'td { padding:6px 8px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }'
    +'.cat-row td { background:#F5C400; color:#000; font-weight:700; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; padding:5px 8px; }'
    +'.even td { background:#fff; } .odd td { background:#fafafa; }'
    +'tr:hover td { background:#fffbeb; }'
    +'.footer { margin-top:20px; padding-top:10px; border-top:1px solid #e5e5e5; display:flex; justify-content:space-between; font-size:9px; color:#aaa; }'
    +'@media print { body { -webkit-print-color-adjust:exact; print-color-adjust:exact; } }'
    +'</style></head><body>'
    +'<div class="page-header">'
    +'<div><div class="logo">&#9889; <span>SERVICE</span> INVENTORY</div><div class="logo-sub">Registro Attrezzature</div></div>'
    +'<div class="date">Generato il '+dateStr+'<br>'+data.gear.length+' attrezzature \u00B7 '+(data.events||[]).length+' eventi</div>'
    +'</div>'
    +'<div class="stats-bar">'
    +'<div class="stat"><div class="stat-n">'+stats.tot+'</div><div class="stat-l">Totale</div></div>'
    +'<div class="stat stat-ok"><div class="stat-n">'+stats.ok+'</div><div class="stat-l">Disponibili</div></div>'
    +'<div class="stat stat-partial"><div class="stat-n">'+stats.partial+'</div><div class="stat-l">Parziali</div></div>'
    +'<div class="stat stat-fault"><div class="stat-n">'+stats.fault+'</div><div class="stat-l">Guasti</div></div>'
    +'</div>'
    +'<h2>Inventario Attrezzature</h2>'
    +'<table><thead><tr>'
    +'<th style="width:28%">Attrezzatura</th><th style="width:22%">Modello</th>'
    +'<th style="width:8%;text-align:center">Tot</th><th style="width:8%;text-align:center">OK</th>'
    +'<th style="width:8%;text-align:center">Fault</th><th style="width:14%;text-align:center">Stato</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table>';

  if(evRows){
    html+='<h2>Eventi Calendario</h2>'
      +'<table><thead><tr>'
      +'<th style="width:30%">Evento</th><th style="width:14%">Data</th><th style="width:22%">Location</th>'
      +'<th style="width:18%;text-align:center">Materiale</th><th style="width:16%;text-align:center">Checklist Mag\u2022Loc</th>'
      +'</tr></thead><tbody>'+evRows+'</tbody></table>';
  }

  // Containers summary
  if(data.containers&&data.containers.length){
    var conRows='';
    data.containers.forEach(function(c,i){
      var items=c.items.map(function(id){return data.gear.find(function(g){return g.id===id;});}).filter(Boolean);
      conRows+='<tr class="'+(i%2===0?'even':'odd')+'">'
        +'<td>'+c.icon+' '+esc(c.name)+'</td>'
        +'<td style="color:#888">'+esc(c.type||'')+'</td>'
        +'<td>'+items.map(function(g){return esc(g.name);}).join(', ')+'</td>'
        +'<td style="text-align:center">'+items.length+'</td>'
        +'</tr>';
    });
    html+='<h2>Contenitori</h2>'
      +'<table><thead><tr><th style="width:25%">Contenitore</th><th style="width:15%">Tipo</th><th>Contenuto</th><th style="width:12%;text-align:center">Item</th></tr></thead>'
      +'<tbody>'+conRows+'</tbody></table>';
  }

  html+='<div class="footer"><span>\u26A1 Service Inventory \u2014 Generato automaticamente</span><span>'+window.location.hostname||'locale'+'</span></div>'
    +'</body></html>';

  var w=window.open('','_blank','width=900,height=700');
  w.document.write(html);
  w.document.close();
  setTimeout(function(){ w.print(); }, 600);
}

function renderAll(){renderInventory();updateHeader();if(activePage==='calendar')renderCalendar();if(activePage==='categories')renderCategories();}
renderAll();
if(isCloudOK()){cloudSetStatus('sync');cloudPull();}else{cloudSetStatus('off');}
</script>
</body>
</html>
